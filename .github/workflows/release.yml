name: Build and release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Project ids are not sensitive, but accept either a Repository Variable or the
      # existing Repository Secret so current installations do not get skipped.
      MODRINTH_PROJECT_ID: ${{ vars.MODRINTH_PROJECT_ID || secrets.MODRINTH_PROJECT_ID }}

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.12'

      - name: Build mod
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="pre-release"
          fi
          echo "MOD_VERSION=$VERSION" >> "$GITHUB_ENV"
          gradle build --no-daemon -Pmod_version="$VERSION"

      - name: Move rolling pre-release tag
        if: github.ref_type != 'tag'
        shell: bash
        run: |
          git tag -f pre-release
          git push origin pre-release --force

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hekuos-guard
          path: build/libs/*.jar
          if-no-files-found: error

      - name: Create GitHub release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            build/libs/hekuos-guard-*.jar

      - name: Extract Modrinth changelog
        if: github.ref_type == 'tag' && env.MODRINTH_PROJECT_ID != ''
        shell: bash
        run: |
          awk -v heading="## [${MOD_VERSION}]" '
            $0 == heading { found=1; next }
            found && /^## / { exit }
            found { print }
            END { if (!found) exit 1 }
          ' CHANGELOG.md > build/modrinth-changelog.md
          test -s build/modrinth-changelog.md

      - name: Publish to Modrinth
        if: github.ref_type == 'tag' && env.MODRINTH_PROJECT_ID != ''
        uses: Kira-NT/mc-publish@v3
        with:
          modrinth-id: ${{ env.MODRINTH_PROJECT_ID }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          name: hekuo's guard ${{ env.MOD_VERSION }}
          version: ${{ env.MOD_VERSION }}
          version-type: release
          files: build/libs/hekuos-guard-${{ env.MOD_VERSION }}.jar
          game-versions: 1.21.1
          loaders: fabric
          changelog-file: build/modrinth-changelog.md

      - name: Update rolling pre-release
        if: github.ref_type != 'tag'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: pre-release
          name: Pre-release
          target_commitish: ${{ github.sha }}
          prerelease: true
          make_latest: false
          overwrite_files: true
          body: Automated pre-release build for ${{ github.sha }}.
          files: |
            build/libs/hekuos-guard-*.jar
